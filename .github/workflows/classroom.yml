name: GitHub Classroom Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install pytest matplotlib --quiet

      - name: Run Section A - Code runs (25 pts)
        id: section-a
        run: python -m pytest tests/test_assignment2.py::TestCodeRuns -v
        continue-on-error: true

      - name: Run Section B - Plot files (25 pts)
        id: section-b
        run: python -m pytest tests/test_assignment2.py::TestPlotsExist -v
        continue-on-error: true

      - name: Run Section C - README filled (35 pts)
        id: section-c
        run: python -m pytest tests/test_assignment2.py::TestREADME -v
        continue-on-error: true

      - name: Run Section D - Code modified (15 pts)
        id: section-d
        run: python -m pytest tests/test_assignment2.py::TestCodeModified -v
        continue-on-error: true

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          SECTION-A-RESULTS: "${{ steps.section-a.outputs.result }}"
          SECTION-B-RESULTS: "${{ steps.section-b.outputs.result }}"
          SECTION-C-RESULTS: "${{ steps.section-c.outputs.result }}"
          SECTION-D-RESULTS: "${{ steps.section-d.outputs.result }}"
        with:
          runners: section-a,section-b,section-c,section-d
